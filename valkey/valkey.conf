# ─────────────────────────────────────────────────────────────────────────────
# Valkey configuration — tuned for a persistent queue workload
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ──────────────────────────────────────────────────────────────────
# Docker network handles isolation; protected-mode would reject non-localhost connections
bind 0.0.0.0
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── Authentication ────────────────────────────────────────────────────────────
# requirepass is injected at startup via the docker-compose command flag
# AUTH
requirepass @ABC12abc

# ── Persistence: RDB (snapshots) ─────────────────────────────────────────────
# DISABLED — RDB snapshots are the root cause of the "stop-writes-on-bgsave-error"
# error. For a queue workload, AOF gives better durability with no write-blocking.
save ""
# Safety net: never block writes on snapshot errors
stop-writes-on-bgsave-error no

# ── Persistence: AOF (Append-Only File) ──────────────────────────────────────
# AOF logs every write operation, making it far better suited to a queue.
appendonly yes
appendfilename "valkey.aof"
# appenddirname is a name only, not a path; the base path is set by "dir"
dir /data
appenddirname "appendonlydir"

# everysec: flush to disk once per second — best balance of safety vs performance.
# Use "always" if you cannot tolerate losing even one second of queue items.
appendfsync everysec

# Don't stall writes during AOF rewrite
no-appendfsync-on-rewrite yes

# Rewrite the AOF file when it doubles in size (min 64 MB)
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Recover from a truncated AOF on startup instead of refusing to start
aof-use-rdb-preamble yes
aof-load-truncated yes

# ── Memory ───────────────────────────────────────────────────────────────────
maxmemory 256mb

# noeviction: never silently drop queue items — return an error instead so the
# application can react (backpressure), rather than losing data.
maxmemory-policy noeviction

# ── Lazy freeing ─────────────────────────────────────────────────────────────
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Logging ──────────────────────────────────────────────────────────────────
# Empty logfile = log to stdout so Docker captures it
loglevel notice
logfile ""

# ── Slow log ─────────────────────────────────────────────────────────────────
# Log commands slower than 10ms (10000 microseconds)
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Misc ─────────────────────────────────────────────────────────────────────
databases 16
hz 10
dynamic-hz yes
activerehashing yes
