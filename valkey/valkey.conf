# Valkey configuration tuned for a durable queue/cache workload.
# The default user ACL is generated at startup from VALKEY_PASSWORD.

# Network
bind 0.0.0.0
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Persistence: disable RDB snapshots and use AOF as the source of durability.
save ""
stop-writes-on-bgsave-error no

appendonly yes
appendfilename "valkey.aof"
dir /data
appenddirname "appendonlydir"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes
aof-load-truncated yes

# Memory
maxmemory 256mb
maxmemory-policy noeviction

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Logging
loglevel notice
logfile ""
slowlog-log-slower-than 10000
slowlog-max-len 128

# Misc
databases 16
hz 10
dynamic-hz yes
activerehashing yes
