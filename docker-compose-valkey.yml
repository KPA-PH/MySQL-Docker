
name: kpa-valkey

services:
  valkey:
    image: valkey/valkey:9.0-trixie
    container_name: valkey
    restart: unless-stopped
    stop_grace_period: 60s
    ports:
      - "${VALKEY_BIND_ADDRESS:-127.0.0.1}:${VALKEY_PORT:-6379}:6379"
    command:
      - sh
      - -c
      - umask 077; printf 'user default on >%s ~* &* +@all\n' "$$VALKEY_PASSWORD" > /data/users.acl; exec valkey-server /etc/valkey/valkey.conf --aclfile /data/users.acl
    volumes:
      - ./valkey/data:/data
      - ./valkey/valkey.conf:/etc/valkey/valkey.conf:ro
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:?Set VALKEY_PASSWORD in .env}
      TZ: ${TZ:-Asia/Manila}
    healthcheck:
      test: ["CMD-SHELL", "VALKEYCLI_AUTH=\"$${VALKEY_PASSWORD}\" valkey-cli ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
